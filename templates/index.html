<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony - AI Image Generator</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <main class="container">
        <header>
            <h1 class="glow-text" style="display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
                Blacksky Labs
                <span
                    style="font-size: 0.45em; font-weight: 400; color: var(--text-secondary); letter-spacing: 1px; margin-top: 0.3rem;">|
                    Brain2Brush</span>
            </h1>
            <div
                style="display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                <a href="/" class="subtitle"
                    style="text-decoration: none; cursor: pointer; transition: all 0.3s ease; color: var(--accent-glow); font-weight: 600;">Generate</a>
                <a href="/sessions" class="subtitle"
                    style="text-decoration: none; cursor: pointer; transition: all 0.3s ease;">Sessions</a>
                <a href="/gallery" class="subtitle"
                    style="text-decoration: none; cursor: pointer; transition: all 0.3s ease;">Gallery</a>
            </div>
        </header>

        <section class="generator-panel glass-panel">
            <div id="session-header-container" class="hidden"
                style="margin-bottom: 1.5rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem;">
                <div
                    style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: var(--text-secondary);">
                    <h2 id="current-session-name" contenteditable="true"
                        style="margin: 0; font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 500; padding: 0.2rem 0.5rem; border-radius: 4px; border: 1px solid transparent; cursor: text; transition: all 0.2s;"
                        title="Click to rename session">Session Name</h2>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="opacity: 0.5;">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </div>
            </div>

            <form id="generate-form">
                <div class="input-group">
                    <label for="prompt-input">What would you like to create?</label>
                    <textarea id="prompt-input"
                        placeholder="A red apple on a wood table, sharp focus, beautiful lighting..." rows="3"
                        required></textarea>
                </div>

                <div class="input-group hidden" id="prompt-review-panel">
                    <label for="elaborated-prompt">AI Elaborated Prompt (Edit before generation)</label>
                    <textarea id="elaborated-prompt" rows="5" class="review-textarea"></textarea>
                    <div class="review-actions hidden" id="review-spacer">
                    </div>
                </div>

                <div class="input-group hidden" id="reference-panel">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Reference Image Guidance</label>
                        <button type="button" id="clear-reference-btn" class="secondary-btn"
                            style="padding: 0.3rem 0.8rem; min-width: auto; font-size: 0.85rem;">Clear</button>
                    </div>
                    <div
                        style="display: flex; gap: 1.5rem; margin-top: 0.5rem; align-items: center; background: rgba(0, 0, 0, 0.2); padding: 1rem; border-radius: 8px; border: 1px solid var(--glass-border);">
                        <img id="reference-thumbnail" src=""
                            style="width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid var(--accent-glow);">
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 0.5rem;">
                            <div style="display: flex; justify-content: space-between;">
                                <label for="image-strength-slider" style="margin: 0; font-size: 0.9rem;">Image Strength
                                    (Structure vs Creativity)</label>
                                <span id="image-strength-value"
                                    style="font-size: 0.9rem; font-weight: 600; color: var(--accent-glow);">0.4</span>
                            </div>
                            <input type="range" id="image-strength-slider" min="0" max="1" step="0.05" value="0.4"
                                style="width: 100%; accent-color: var(--accent-glow);">
                            <p style="font-size: 0.75rem; color: var(--text-secondary); margin: 0;">Lower = More
                                freedom. Higher = Resembles image closer.</p>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Image Size</label>
                    <div class="radio-group" id="size-select-group">
                        <label class="radio-option">
                            <input type="radio" name="size" value="512" checked>
                            <span class="radio-label">Small (512x512)</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="size" value="768">
                            <span class="radio-label">Medium (768x768)</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="size" value="1024">
                            <span class="radio-label">Large (1024x1024)</span>
                        </label>
                    </div>
                </div>

                <div class="controls-row">
                    <label class="toggle-switch">
                        <input type="checkbox" id="skip-brain">
                        <span class="slider"></span>
                        <span class="toggle-label">Skip Brain (Direct to Model)</span>
                    </label>
                    <div style="display: flex; gap: 1rem; flex: 1; justify-content: flex-end;">
                        <button type="button" id="reroll-btn" class="secondary-btn hidden">
                            <span class="btn-text">Re-roll Prompt</span>
                            <span class="btn-loader hidden"></span>
                        </button>
                        <button type="submit" id="generate-btn" class="primary-btn">
                            <span class="btn-text">Generate Prompt</span>
                            <span class="btn-loader hidden"></span>
                        </button>
                        <button type="button" id="new-prompt-btn" class="secondary-btn hidden"
                            style="margin-left: 1rem;">
                            <span class="btn-text">New Prompt</span>
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <section class="result-panel glass-panel hidden" id="result-container">
            <div class="prompt-details hidden" id="prompt-details" style="border-top: none; padding-top: 0;">
                <div
                    style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.75rem;">
                    <h3 style="margin-bottom: 0;">Expanded Prompt</h3>
                    <h3 style="margin-bottom: 0;">Time: <span id="final-time-text"
                            style="color: var(--accent-glow);">0.0s</span></h3>
                </div>
                <p id="expanded-prompt-text"></p>
            </div>

            <div id="image-queue" style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1.5rem;">
                <!-- New images will be prepended here as wrappers -->
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>

</html>
